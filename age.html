<!-- NOTIFICATION LIST -->

<h3>Notification Sent List</h3>

<button onclick="clearList()">Clear Notification List</button>

<table id="notifyTable">

<tr>
<th>Name</th>
<th>Time</th>
</tr>

</table>



<br>

<a href="main.html">
<button>Back</button>
</a>



<script>


let data = localStorage.getItem("notifyList")

if(data){

let list = JSON.parse(data)

let table = document.getElementById("notifyTable")

list.forEach(function(d){

table.innerHTML += `
<tr>
<td>${d.name}</td>
<td>${d.time}</td>
</tr>
`

})

}



function clearList(){

localStorage.removeItem("notifyList")

let table = document.getElementById("notifyTable")

table.innerHTML = `
<tr>
<th>Name</th>
<th>Time</th>
</tr>
`

}


</script>


</body>
